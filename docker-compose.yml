services:

  # ── Unified API (Salary + Degree + Forecast) ──
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: joblens_api
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      DATA_DIR: /app/data

  # ── Streamlit Frontend ──
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: joblens_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_URL: http://api:10000
      NLP_API_URL: https://arijarfaoui39--recommend.modal.run
      NLP_API_KEY: ${NLP_API_KEY}
      POWERBI_EMBED_URL: ${POWERBI_EMBED_URL}
